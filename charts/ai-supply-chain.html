<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>产业链图谱 — AI 算力 + 机器人</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #07101d;
  font-family: 'PingFang SC', 'Hiragino Sans GB', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  color: #e2e8f0;
  padding-left: 200px;
  min-width: 1240px;
  overflow-x: auto;
  transition: padding-left 0.28s cubic-bezier(0.4,0,0.2,1);
}
body.sidebar-collapsed { padding-left: 56px; }

/* ── Sidebar ── */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 200px;
  background: #050a13;
  border-right: 1px solid rgba(255,255,255,0.06);
  padding: 22px 12px;
  z-index: 9500;
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  transition: width 0.28s cubic-bezier(0.4,0,0.2,1);
}
#sidebar.collapsed { width: 56px; padding: 22px 8px; }

#sidebar-toggle {
  position: absolute; top: 18px; right: -12px;
  width: 24px; height: 24px;
  background: #0d1829;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  color: #94a3b8; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s, transform 0.28s cubic-bezier(0.4,0,0.2,1);
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
#sidebar-toggle:hover { background: #1e293b; color: #f1f5f9; }
#sidebar.collapsed #sidebar-toggle { transform: rotate(180deg); }

.sidebar-brand {
  display: flex; align-items: center; gap: 9px;
  padding: 0 6px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 12px;
  white-space: nowrap; overflow: hidden;
}
#sidebar.collapsed .sidebar-brand { justify-content: center; padding: 0 0 18px; }
.sidebar-brand-icon { font-size: 18px; flex-shrink: 0; }
.sidebar-brand-text {
  font-size: 13px; font-weight: 800; color: #f1f5f9;
  letter-spacing: 0.04em;
  transition: opacity 0.2s ease;
}
.sidebar-section {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: #334155;
  padding: 0 6px; margin: 6px 0 8px;
  white-space: nowrap; overflow: hidden;
  transition: opacity 0.2s ease, height 0.2s ease, margin 0.2s ease;
}
#sidebar.collapsed .sidebar-brand-text,
#sidebar.collapsed .sidebar-section {
  opacity: 0; height: 0; margin: 0; pointer-events: none;
}

.tab-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 11px; border-radius: 9px;
  background: transparent; border: none; cursor: pointer;
  color: #94a3b8;
  text-align: left;
  transition: background 0.15s, color 0.15s, padding 0.28s;
  margin-bottom: 4px;
  width: 100%;
  white-space: nowrap; overflow: hidden;
  position: relative;
}
#sidebar.collapsed .tab-btn { padding: 11px 8px; justify-content: center; gap: 0; }
.tab-btn:hover { background: rgba(255,255,255,0.04); color: #cbd5e1; }
.tab-btn.active {
  background: rgba(59,130,246,0.12);
  color: #f1f5f9;
  box-shadow: inset 3px 0 0 #3b82f6;
}
.tab-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
.tab-text {
  display: flex; flex-direction: column; gap: 2px;
  transition: opacity 0.2s ease, width 0.28s ease;
  overflow: hidden;
}
#sidebar.collapsed .tab-text { opacity: 0; width: 0; pointer-events: none; }
.tab-label { font-size: 13px; font-weight: 700; line-height: 1.2; }
.tab-sub   { font-size: 10px; color: #64748b; }
.tab-btn.active .tab-sub { color: #94a3b8; }

/* Tooltip on collapsed sidebar tabs */
#sidebar.collapsed .tab-btn::after {
  content: attr(data-tooltip);
  position: absolute; left: calc(100% + 14px); top: 50%;
  transform: translateY(-50%);
  background: #1e293b;
  color: #f1f5f9;
  font-size: 11px; font-weight: 600;
  padding: 5px 10px; border-radius: 6px;
  white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s, transform 0.15s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  z-index: 100;
}
#sidebar.collapsed .tab-btn:hover::after {
  opacity: 1;
  transform: translateY(-50%) translateX(2px);
}

/* ── Header ── */
header {
  padding: 26px 52px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: flex-start; justify-content: space-between;
}
.header-left h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.02em; color: #f8fafc; }
.header-left p  { font-size: 12px; color: #475569; margin-top: 5px; }

#settings-btn {
  flex-shrink: 0; margin-left: 20px; margin-top: 2px;
  width: 34px; height: 34px; border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #64748b; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
#settings-btn:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
#settings-btn.active { color: #60a5fa; border-color: #3b82f6; background: rgba(59,130,246,0.1); }

.top-bar {
  display: flex; align-items: center;
  padding: 10px 52px; gap: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  background: rgba(255,255,255,0.015);
  flex-wrap: wrap;
}
.lpill { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #94a3b8; white-space: nowrap; }
.lpill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.badges { margin-left: auto; display: flex; gap: 14px; align-items: center; font-size: 11px; color: #64748b; }
.badge { display: flex; align-items: center; gap: 5px; }
.b-sq { width: 22px; height: 13px; border-radius: 3px; }
.b-user { border: 2px solid rgba(255,255,255,0.55); background: rgba(255,255,255,0.04); }
.b-add  { border: 1px dashed rgba(255,255,255,0.28); }

.score-hint {
  padding: 9px 52px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 11px; color: #475569;
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
}
.score-bar { display: flex; align-items: center; gap: 6px; }
.score-swatch { width: 28px; height: 7px; border-radius: 4px; }

#ws-bar {
  padding: 7px 52px; font-size: 11px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.4s, color 0.4s;
}
#ws-bar.connected    { background: rgba(34,197,94,0.05);  color: #4ade80; }
#ws-bar.disconnected { background: rgba(245,158,11,0.05); color: #94a3b8; }
.ws-dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0;
}
#ws-bar.connected .ws-dot { animation: wsPulse 1.6s ease-in-out infinite; }
@keyframes wsPulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

.heat-legend {
  margin-left: auto; display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
}
.heat-legend-label { font-size: 10px; color: #475569; margin-right: 2px; white-space: nowrap; }
.heat-swatch { width: 18px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.heat-legend-txt { font-size: 9.5px; color: #475569; margin-right: 3px; white-space: nowrap; }

#wrap { padding: 24px 52px 40px; overflow-x: auto; transition: padding-right 0.3s ease; }
#diagram { position: relative; width: 1320px; }

.band {
  position: absolute; left: -10px; right: -10px;
  border-radius: 14px; pointer-events: none;
}

/* ── Cards ── */
.card {
  position: absolute; width: 160px;
  border-radius: 11px; padding: 11px 13px 11px;
  cursor: pointer;
  transition: opacity 0.18s ease, transform 0.16s ease, box-shadow 0.16s ease;
}
.card.user { border-style: solid;  border-width: 2px; }
.card.add  { border-style: dashed; border-width: 1px; }

.card.l0.user  { border-color: #8b5cf6; background: rgba(139,92,246,0.11); }
.card.l0.add   { border-color: rgba(139,92,246,0.38); background: rgba(139,92,246,0.05); }
.card.l0 .tic  { color: #a78bfa; }
.card.l1.user  { border-color: #3b82f6; background: rgba(59,130,246,0.11); }
.card.l1.add   { border-color: rgba(59,130,246,0.38); background: rgba(59,130,246,0.05); }
.card.l1 .tic  { color: #60a5fa; }
.card.l2.user  { border-color: #06b6d4; background: rgba(6,182,212,0.11); }
.card.l2.add   { border-color: rgba(6,182,212,0.38); background: rgba(6,182,212,0.05); }
.card.l2 .tic  { color: #22d3ee; }
.card.l3.user  { border-color: #10b981; background: rgba(16,185,129,0.11); }
.card.l3.add   { border-color: rgba(16,185,129,0.38); background: rgba(16,185,129,0.05); }
.card.l3 .tic  { color: #34d399; }
.card.l4.user  { border-color: #f59e0b; background: rgba(245,158,11,0.11); }
.card.l4.add   { border-color: rgba(245,158,11,0.38); background: rgba(245,158,11,0.05); }
.card.l4 .tic  { color: #fbbf24; }
.card.l5.user  { border-color: #ef4444; background: rgba(239,68,68,0.11); }
.card.l5.add   { border-color: rgba(239,68,68,0.38); background: rgba(239,68,68,0.05); }
.card.l5 .tic  { color: #f87171; }

.heat-layer {
  position: absolute; inset: 0; pointer-events: none;
  transition: background 0.7s ease;
  z-index: 0;
}
.tic, .co, .desc, .price-row { position: relative; z-index: 1; }

.tic  { font-size: 14px; font-weight: 800; letter-spacing: 0.05em; line-height: 1; }
.co   { font-size: 9px; color: #64748b; margin-top: 3px; line-height: 1.3; }
.desc { font-size: 9.5px; color: #cbd5e1; margin-top: 6px; line-height: 1.45; }

.price-row {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-top: 6px; padding-top: 5px;
  border-top: 1px solid rgba(255,255,255,0.07);
  min-height: 18px;
}
.price-row.hidden { visibility: hidden; }
.live-price { font-size: 11px; font-weight: 700; color: #f1f5f9; letter-spacing: 0.01em; }
.live-chg   { font-size: 10.5px; font-weight: 800; }
.live-chg.pos { color: #4ade80; }
.live-chg.neg { color: #f87171; }
.live-chg.neu { color: #94a3b8; }

.score-badge {
  position: absolute; top: -12px; right: -8px;
  font-size: 10px; font-weight: 800;
  padding: 2px 8px; border-radius: 20px;
  z-index: 1000; white-space: nowrap;
  box-shadow: 0 2px 12px rgba(0,0,0,0.55);
  letter-spacing: 0.02em; color: #000;
  animation: popIn 0.12s ease;
}
.score-badge .da { font-size: 8px; opacity: 0.7; margin-right: 2px; }
@keyframes popIn {
  from { transform: scale(0.6); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

.card.hovered { transform: translateY(-5px) scale(1.04) !important; z-index: 998; }
.card.dimmed  { opacity: 0.08 !important; }
.card.lit     { opacity: 1 !important; }
.card.selected { box-shadow: 0 0 0 3px rgba(255,255,255,0.35), 0 16px 48px rgba(0,0,0,0.6) !important; z-index: 997; }

#arrows { position: absolute; top: 0; left: 0; width: 100%; overflow: visible; pointer-events: none; }

/* ── Detail Panel ── */
#panel {
  position: fixed; top: 0; right: -440px; width: 420px; height: 100vh;
  background: #0d1829;
  border-left: 1px solid rgba(255,255,255,0.08);
  box-shadow: -12px 0 48px rgba(0,0,0,0.6);
  z-index: 9000;
  transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#panel.open { right: 0; }

#panel-close {
  position: absolute; top: 16px; right: 16px;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
#panel-close:hover { background: rgba(255,255,255,0.12); color: #f1f5f9; }

#panel-body { flex: 1; overflow-y: auto; padding: 28px 24px 40px; }
#panel-body::-webkit-scrollbar { width: 4px; }
#panel-body::-webkit-scrollbar-track { background: transparent; }
#panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.panel-layer-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 14px;
}
.panel-ticker { font-size: 38px; font-weight: 900; letter-spacing: 0.04em; line-height: 1; }
.panel-coname { font-size: 13px; color: #64748b; margin-top: 6px; }

.panel-live {
  display: flex; align-items: baseline; gap: 12px; margin-top: 10px;
}
.panel-live-price { font-size: 26px; font-weight: 800; color: #f1f5f9; }
.panel-live-chg   { font-size: 14px; font-weight: 700; }
.panel-live-chg.pos { color: #4ade80; }
.panel-live-chg.neg { color: #f87171; }
.panel-live-chg.neu { color: #64748b; }
.panel-live-details { font-size: 11px; color: #475569; margin-top: 4px; }

.panel-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 18px 0; }
.panel-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: #475569; margin-bottom: 10px;
}
.panel-summary { font-size: 13px; color: #cbd5e1; line-height: 1.75; }

.rel-list { display: flex; flex-direction: column; gap: 8px; }
.rel-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 9px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer; transition: background 0.15s;
}
.rel-item:hover { background: rgba(255,255,255,0.07); }
.rel-dir { font-size: 10px; color: #64748b; flex-shrink: 0; width: 30px; }
.rel-ticker { font-size: 13px; font-weight: 800; flex-shrink: 0; width: 46px; }
.rel-co { font-size: 10px; color: #64748b; flex: 1; }
.rel-score-bar-wrap { flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
.rel-score-bar { height: 5px; border-radius: 3px; }
.rel-score-num { font-size: 11px; font-weight: 700; width: 24px; text-align: right; }

.action-btns { display: flex; gap: 10px; margin-bottom: 4px; }
.action-btn {
  flex: 1; padding: 10px 8px; border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: #cbd5e1; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.action-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.2); }
.action-btn.loading { opacity: 0.6; pointer-events: none; }
.action-btn.active  { border-color: #3b82f6; color: #60a5fa; background: rgba(59,130,246,0.1); }

.data-section { margin-top: 16px; }
.data-section.hidden { display: none; }

.news-item {
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; flex-direction: column; gap: 5px;
}
.news-item:last-child { border-bottom: none; }
.news-headline { font-size: 12.5px; color: #e2e8f0; line-height: 1.55; text-decoration: none; display: block; }
.news-headline:hover { color: #60a5fa; }
.news-meta { font-size: 10px; color: #475569; display: flex; gap: 10px; }
.news-source { color: #64748b; font-weight: 600; }

.earnings-card {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 13px 14px; margin-bottom: 10px;
  background: rgba(255,255,255,0.02);
}
.earnings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.earnings-period { font-size: 12px; font-weight: 700; color: #94a3b8; }
.earnings-surprise { font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 20px; }
.surprise-pos { background: rgba(34,197,94,0.15); color: #22c55e; }
.surprise-neg { background: rgba(239,68,68,0.15); color: #ef4444; }
.surprise-neu { background: rgba(148,163,184,0.12); color: #94a3b8; }
.eps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.eps-cell { display: flex; flex-direction: column; gap: 3px; }
.eps-label { font-size: 9.5px; color: #475569; letter-spacing: 0.06em; text-transform: uppercase; }
.eps-val { font-size: 15px; font-weight: 800; }
.eps-actual { color: #e2e8f0; }
.eps-est    { color: #64748b; }

.data-empty { font-size: 12px; color: #475569; text-align: center; padding: 20px 0; line-height: 1.6; }
.data-error { font-size: 12px; color: #f87171; text-align: center; padding: 16px 0; line-height: 1.6; }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.15); border-top-color: #60a5fa;
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#settings-overlay {
  display: none; position: fixed; inset: 0; z-index: 99000;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#settings-overlay.open { display: flex; }
#settings-modal {
  width: 440px; background: #0d1829;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 32px 32px 28px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
}
.settings-title { font-size: 17px; font-weight: 800; color: #f1f5f9; margin-bottom: 6px; }
.settings-sub   { font-size: 12px; color: #475569; margin-bottom: 28px; line-height: 1.55; }
.settings-field { margin-bottom: 20px; }
.settings-label {
  font-size: 11px; font-weight: 700; color: #64748b;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.key-status { font-size: 10px; letter-spacing: 0; text-transform: none; font-weight: 600; }
.key-ok   { color: #22c55e; }
.key-miss { color: #f59e0b; }
.settings-input {
  width: 100%; padding: 11px 14px; border-radius: 9px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #e2e8f0; font-size: 13px; font-family: 'SF Mono', 'Menlo', monospace;
  outline: none; transition: border-color 0.15s;
}
.settings-input:focus { border-color: #3b82f6; background: rgba(59,130,246,0.06); }
.settings-input::placeholder { color: #334155; }
.settings-note { font-size: 11px; color: #334155; margin-top: 6px; line-height: 1.5; }
.settings-actions { display: flex; gap: 10px; margin-top: 28px; justify-content: flex-end; }
.btn-cancel {
  padding: 9px 20px; border-radius: 8px;
  background: transparent; border: 1px solid rgba(255,255,255,0.1);
  color: #64748b; font-size: 13px; cursor: pointer; transition: background 0.15s;
}
.btn-cancel:hover { background: rgba(255,255,255,0.05); color: #94a3b8; }
.btn-save {
  padding: 9px 24px; border-radius: 8px;
  background: #2563eb; border: none;
  color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background 0.15s;
}
.btn-save:hover { background: #1d4ed8; }
</style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <button id="sidebar-toggle" title="展开 / 收起侧边栏">‹</button>
  <div class="sidebar-brand">
    <span class="sidebar-brand-icon">📊</span>
    <span class="sidebar-brand-text">产业图谱</span>
  </div>
  <div class="sidebar-section">主题</div>
  <button class="tab-btn" data-chart="ai" data-tooltip="AI 算力 · 30">
    <span class="tab-icon">🧠</span>
    <div class="tab-text">
      <div class="tab-label">AI 算力</div>
      <div class="tab-sub">基础设施 · 30</div>
    </div>
  </button>
  <button class="tab-btn" data-chart="robot" data-tooltip="机器人 · 24">
    <span class="tab-icon">🤖</span>
    <div class="tab-text">
      <div class="tab-label">机器人</div>
      <div class="tab-sub">产业链 · 24</div>
    </div>
  </button>
</aside>

<header>
  <div class="header-left">
    <h1 id="page-title"></h1>
    <p id="page-subtitle"></p>
  </div>
  <button id="settings-btn" title="API 设置">⚙</button>
</header>

      SMCI: { summary: 'Super Micro Computer 是 GPU 服务器整机设计与制造商，专注于液冷服务器系统和高密度机架解决方案。是 NVIDIA GB200 最大整机集成商（25% Blackwell 供货份额），$13B GB300 系统订单。' },
      P:    { summary: 'Everpure（NYSE: P，原 Pure Storage / PSTG，2026 年 2 月更名）是企业级全闪存存储平台公司。FlashBlade//EXA 为 AI 训练提供极高吞吐的共享存储，已成为 Azure Native 服务。' },
      VRT:  { summary: 'Vertiv Holdings 是关键数据中心基础设施提供商，专注于电源（UPS、PDU）和热管理（液冷、风冷）系统。AI GPU 单颗功耗高达 1000W 以上，液冷成为刚需。' },
      AMZN: { summary: 'Amazon Web Services（AWS）是全球最大云服务商（市占率约 31%）。AWS 自研 Trainium2 和 Inferentia2 AI 芯片，战略目的是减少对 NVIDIA 的依赖并降低算力成本。2026 年资本支出预计超 1000 亿美元。' },
      NBIS: { summary: 'Nebius Group 是前 Yandex N.V. 旗下 AI 基础设施云公司，2024 年剥离俄罗斯资产后重组上市。定位为 AI 原生 GPU 云。NVIDIA 直接战略投资，Everpure 和 Arista 是其核心硬件供应商。' },
      HUT:  { summary: 'Hut 8 是加拿大数字基础设施公司，正从比特币挖矿转型为高性能计算（HPC）与 AI GPU 云。持有大量自有电力合同和数据中心资产。' },

    info: {
      RRX:  { summary: 'Regal Rexnord 是全球第二大精密齿轮箱制造商（仅次于日本 Nabtesco），旗下 Kollmorgen 伺服电机 + Thomson 直线运动 + 精密减速器组成完整机器人关节解决方案。人形机器人单台需要 28-40 个精密减速器，RRX 是少数能批量供应的美国本土厂商。2026 年 Tesla Optimus、Figure 等人形机器人量产爬坡将直接驱动 RRX 关节业务高速增长，是机器人产业链中美股最纯粹的精密机械标的。' },
      TKR:  { summary: 'Timken 是全球领先的精密轴承制造商，应用涵盖工业机器人关节、surgical robots、卫星陀螺仪、风电主轴等。机器人关节中的高精度轴承需求随人形机器人量产将快速增长，TKR 在小尺寸高精度轴承领域有明显优势。也受益于机器人之外的工业自动化、航空航天大潮，业务相对稳健，估值合理。' },
      AME:  { summary: 'Ametek 是高度多元化的精密仪器与电气机电公司，旗下包括精密运动控制、热成像、电源管理等业务。其精密运动控制部门为 surgical robots、半导体设备和工业自动化提供关键组件。Ametek 通过持续并购扩张机器人相关业务，是低调但稳健的精密机电平台型公司，长期复合增长率优秀。' },
      NVDA: { summary: 'NVIDIA 在 AI 算力基础设施已是龙头，在机器人领域同样布局深远。Jetson Thor 平台为人形机器人提供 AI 大脑，Isaac 机器人开发平台是行业事实标准。GR00T 通用人形机器人基础模型与全球主要人形机器人厂商（Figure、Apptronik、1X 等）合作。机器人业务 2026 Q2 营收 5.86 亿美元，是 NVIDIA 内部增速最快的板块之一，是 AI + 机器人双线龙头。' },
      QCOM: { summary: 'Qualcomm 2026 年 CES 推出 Dragonwing 机器人芯片系列，专为人形机器人和 AMR 设计。IQ10 系列集成实时电机控制 + AI 推理，与 Figure、KUKA、VinMotion 等多家人形/工业机器人厂商达成设计合作。Qualcomm 凭借其在移动端低功耗 AI 处理器的积累，是 NVIDIA 在机器人 AI 处理器领域最强劲的挑战者。' },
      TXN:  { summary: 'Texas Instruments 是全球最大模拟芯片公司，机器人的"神经与肌肉"系统：电机驱动 IC、传感器接口、电源管理、嵌入式 MCU。每个机器人关节都需 TXN 的电机驱动芯片（DRV 系列），人形机器人 28-40 个关节大幅放大 TI 单机价值量。是机器人量产化中最直接的"卖铲人"标的，业务覆盖工业、汽车、医疗、消费各类机器人。' },
      ADI:  { summary: 'Analog Devices 在 MEMS 惯性测量单元（IMU）领域全球领先，ADIS16 系列是工业级 IMU 标杆产品，被广泛用于人形机器人平衡控制、surgical robots 精确定位、drone 飞行姿态感知。机器人量产对高精度 IMU 需求快速增长，ADI 单机价值量提升明显。同时还提供电机控制、信号链等机器人核心模拟芯片。' },
      INTC: { summary: 'Intel 在机器人领域以边缘 AI + 实时控制双线布局。Core Ultra Series 3 + 即将发布的 Panther Lake 提供高性能边缘 AI 推理；Robotics AI Suite 集成 ROS 2 + OpenVINO 等开源工具链。已与 200+ 全球机器人 OEM 合作。在工厂自动化和 surgical robots 等需要 x86 兼容性的场景仍是首选。' },
      CGNX: { summary: 'Cognex 是全球工业机器视觉龙头，市占率超 50%。In-Sight 6900（NVIDIA 驱动）、In-Sight 3900（QCOM 驱动）AI 视觉相机被广泛部署于 pick-and-place、surgical robots 引导、warehouse robots 物品识别。Q1 2026 营收同比 +24%，是机器人视觉感知最纯粹的投资标的，也是机器人量产化最直接的设备类受益者。' },
      OUST: { summary: 'Ouster 是数字 LiDAR 龙头（2023 年与 Velodyne 合并后）。其 OS 系列 LiDAR 被广泛用于 Symbotic 仓储机器人、SERV 自动配送、AMR 自主导航等。LiDAR 在工业机器人导航、warehouse robots 避障中是关键传感器，OUST 受益于机器人导航需求的快速增长。' },
      AEVA: { summary: 'Aeva 提供 FMCW LiDAR 技术，相比传统 ToF LiDAR 可以直接测量速度（多普勒效应），且不易受太阳光干扰，是下一代 LiDAR 技术方向。已有 Daimler、SK Telecom 等战略合作。FMCW 在 surgical robots、自主车辆等精度敏感场景具有差异化优势，但目前商业化进度较慢，属于高弹性早期标的。' },
      TDY:  { summary: 'Teledyne Technologies 是全球热成像和工业成像龙头（2021 年收购 FLIR），产品覆盖热成像相机、工业相机、医疗影像传感器。在 drones（无人机）、surgical robots 红外引导、工业检测中有广泛应用。多元化业务结构使其在机器人之外还受益于国防、航天等领域增长。' },
      ROK:  { summary: 'Rockwell Automation 是全球工业自动化龙头，FactoryTalk 软件控制全球 50%+ 工厂。收购 Clearpath 后获得 OTTO 移动机器人能力，正与 ABB 等合作集成 cobot。机器人化工厂转型直接利好 ROK 的 PLC、伺服驱动、运动控制等核心业务。是制造业回流和机器人化升级最直接的美股标的。' },
      EMR:  { summary: 'Emerson Electric 是全球工业自动化与过程控制龙头，业务涵盖工厂自动化、流程工业控制、电机驱动等。受益于美国制造业回流和工厂自动化升级的大趋势，机器人化工厂建设直接拉动 Emerson 的控制系统与电机产品销售。' },
      ABB:  { summary: 'ABB 是全球工业机器人四大家族之一（瑞士企业，纽约 ADR）。ABB Robotics 在工业机器人和协作机器人领域市占率全球前三，同时拥有伺服电机、驱动器、自动化系统全套产品。在美国制造业回流和电动化生产线大规模部署中是重要受益者。' },
      TER:  { summary: 'Teradyne 是半导体测试设备龙头，同时拥有 Universal Robots（全球协作机器人龙头，市占率超 35%）和 MiR（移动机器人）。2026 年新设密歇根机器人制造中心，加强美国本土生产。协作机器人在制造业回流、中小企业自动化中需求快速增长，UR + MiR 是 Teradyne 第二增长曲线。' },
      SYM:  { summary: 'Symbotic 是仓储自动化机器人龙头，已与 Walmart 达成 5.2 亿美元投资 + 收购 ASR 业务的战略协议，是 Walmart 仓储机器人化的独家合作伙伴。Q2 2026 在手订单 227 亿美元，业绩能见度极高。机器人每小时处理货物量是人工的 10 倍，是仓储革命中最纯粹的投资标的。' },
      ISRG: { summary: 'Intuitive Surgical 是手术机器人绝对龙头，市值 1740 亿美元，da Vinci 系统全球手术机器人市占率超 60%。Ion 平台拓展支气管介入治疗。Q1 2026 手术量同比 +17%。新一代 da Vinci 5 已上市，技术领先竞争对手 Medtronic Hugo 1-2 个代际，是医疗机器人最稳健的长期复利标的。' },
      MDT:  { summary: 'Medtronic 是全球医疗器械巨头，Hugo RAS 手术机器人是 ISRG da Vinci 最大挑战者。2025-2026 在欧美陆续获批，正在快速布局市场。虽然技术上落后 ISRG 1-2 个代际，但 Medtronic 的渠道、品牌和医院关系优势可帮助 Hugo 突破，是手术机器人第二梯队的代表。' },
      SYK:  { summary: 'Stryker 是骨科医疗器械龙头，Mako 机器人在膝关节/髋关节置换术市场是事实标准，渗透率持续提升。骨科手术机器人的 ROI 已被广泛验证（缩短住院时间、降低并发症），医院采购意愿强劲，Mako 是 Stryker 高质量复合增长的核心引擎之一。' },
      TSLA: { summary: 'Tesla 是全球电动车龙头，但更核心的看点是 Optimus 人形机器人。预计 2026 Q2 启动量产，2026 全年目标 5-10 万台。Optimus 整合 Tesla 在视觉感知（Dojo 训练）、电池、电机、自动驾驶上的全栈能力。如果量产成功，Tesla 将从汽车公司升级为通用机器人平台公司，估值逻辑彻底重塑，是机器人时代最具想象空间的标的。' },
      AVAV: { summary: 'AeroVironment 是全球小型无人机龙头，Switchblade、Puma 等已在乌克兰战场大规模使用。机器人化战争（包括无人机蜂群、地面机器人）使其订单能见度极高。从纯防务向机器人系统供应商转型，是国防 + 机器人双重叙事的标的。' },

const LS_FH       = 'ai_chain_finnhub_key';
const LS_CHART    = 'ai_chain_current_chart';

function refreshSettingsBtn() {
  document.getElementById('settings-btn').classList.toggle('active', !!getFhKey());
}

document.getElementById('settings-btn').addEventListener('click', () => {

// ── Shared state ──────────────────────────────────────────────────────────────
let currentChart = 'ai';
let nm = {};
let adj = {};
let svgPaths = [];
let selectedId = null;
let newsOpen = false, earningsOpen = false;
const liveQuotes = {};  // shared across both charts

// ── Render functions ──────────────────────────────────────────────────────────
function scoreStyle(s) {
  if (s >= 8) return { color:'#22c55e', mk:'ah-g' };
  if (s >= 6) return { color:'#eab308', mk:'ah-y' };
  if (s >= 4) return { color:'#f97316', mk:'ah-o' };
  return             { color:'#ef4444', mk:'ah-r' };
}

function heatBg(pct) {
  if (pct == null) return '';
  if (pct >=  5)  return 'rgba(22,163,74,0.42)';
  if (pct >=  3)  return 'rgba(34,197,94,0.28)';
  if (pct >=  1)  return 'rgba(74,222,128,0.14)';
  if (pct >=  0)  return 'rgba(74,222,128,0.05)';
  if (pct >= -1)  return 'rgba(252,165,165,0.05)';
  if (pct >= -3)  return 'rgba(239,68,68,0.18)';
  if (pct >= -5)  return 'rgba(239,68,68,0.30)';
  return                  'rgba(185,28,28,0.44)';
}

function applyQuote({ ticker, price, changePct }) {
  const n = nm[ticker]; if (!n) return;
  n.heatEl.style.background = heatBg(changePct);
  const priceStr = price != null
    ? '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    : '';
  const pctStr   = changePct != null
    ? (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%'
    : '';
  const cls = changePct > 0.01 ? 'pos' : changePct < -0.01 ? 'neg' : 'neu';
  n.priceEl.classList.remove('hidden');
  n.priceEl.innerHTML =
    `<span class="live-price">${priceStr}</span>` +
    `<span class="live-chg ${cls}">${pctStr}</span>`;
}

function resetAll() {
  Object.values(nm).forEach(n => {
    const el = n.el;
    el.classList.remove('hovered','dimmed','lit','selected');
    el.style.boxShadow = '';
    el.querySelectorAll('.score-badge').forEach(b => b.remove());
  });
  svgPaths.forEach(p => {
    if (!p) return;
    p.setAttribute('stroke','rgba(100,116,139,0.20)'); p.setAttribute('stroke-width','1.5');
    p.setAttribute('marker-end','url(#ah-d)'); p.style.opacity = '1';
  });
}

function renderChart(chartKey) {
  const chart = CHARTS[chartKey];
  if (!chart) return;
  currentChart = chartKey;
  localStorage.setItem(LS_CHART, chartKey);

  // Update tab states
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.chart === chartKey);
  });

  // Update title + subtitle
  document.getElementById('page-title').textContent = chart.title;
  document.getElementById('page-subtitle').innerHTML = chart.subtitle;

  // Update top-bar
  const topBar = document.getElementById('top-bar');
  topBar.innerHTML = chart.layerNames.map((name, i) =>
    `<span class="lpill"><span class="lpill-dot" style="background:${LCOLORS[i]}"></span>${i} · ${name}</span>`
  ).join('') + `
    <div class="badges">
      <span class="badge"><span class="b-sq b-user"></span>核心标的</span>
      <span class="badge"><span class="b-sq b-add"></span>补充标的</span>
    </div>
  `;

  // Reset state
  closePanel();
  nm = {};
  adj = {};
  svgPaths = [];

  // Clear diagram
  const diagram = document.getElementById('diagram');
  diagram.innerHTML = '<svg id="arrows"></svg>';
  diagram.style.width = chart.width + 'px';

  const nodes = chart.nodes;
  const edges = chart.edges;
  const totalH = LY[5] + CH + 30;
  diagram.style.height = totalH + 'px';

  // Bands
  LY.forEach((y, i) => {
    const b = document.createElement('div');
    b.className = 'band';
    b.style.cssText = `top:${y - 12}px; height:${CH + 24}px; background:${LCOLORS[i]}10;`;
    diagram.appendChild(b);
  });

  // Cards
  nodes.forEach(n => {
    const card = document.createElement('div');
    card.className = `card l${n.l} ${n.u ? 'user' : 'add'}`;
    card.style.left = n.x + 'px';
    card.style.top  = LY[n.l] + 'px';

    const heatLayer = document.createElement('div');
    heatLayer.className = 'heat-layer';

    const priceRow = document.createElement('div');
    priceRow.className = 'price-row hidden';

    card.innerHTML =
      `<div class="tic">${n.id}</div>` +
      `<div class="co">${n.co}</div>` +
      `<div class="desc">${n.desc.split('\n').join('<br>')}</div>`;

    card.prepend(heatLayer);
    card.appendChild(priceRow);

    diagram.appendChild(card);
    nm[n.id] = { x: n.x, y: LY[n.l], l: n.l, co: n.co, el: card, heatEl: heatLayer, priceEl: priceRow };
  });

  // SVG arrows
  const svg = document.getElementById('arrows');
  svg.setAttribute('width', String(chart.width));
  svg.setAttribute('height', String(totalH));

  function mkMarker(id, color) {
    return `<marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="${color}"/></marker>`;
  }
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = mkMarker('ah-d','rgba(100,116,139,0.55)') + mkMarker('ah-g','#22c55e') + mkMarker('ah-y','#eab308') + mkMarker('ah-o','#f97316') + mkMarker('ah-r','#ef4444');
  svg.appendChild(defs);

  edges.forEach((e) => {
    const s = nm[e.f], t = nm[e.t];
    if (!s || !t) { svgPaths.push(null); return; }
    const x1 = s.x + CW/2, y1 = s.y + CH, x2 = t.x + CW/2, y2 = t.y - 1, mid = (y1+y2)/2;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', `M${x1},${y1} C${x1},${mid} ${x2},${mid} ${x2},${y2}`);
    p.setAttribute('stroke','rgba(100,116,139,0.20)'); p.setAttribute('stroke-width','1.5');
    p.setAttribute('fill','none'); p.setAttribute('marker-end','url(#ah-d)');
    p.style.transition = 'opacity 0.15s ease';
    svg.appendChild(p); svgPaths.push(p);
  });

  // Adjacency
  nodes.forEach(n => adj[n.id] = []);
  edges.forEach((e, i) => {
    if (adj[e.f]) adj[e.f].push({ id: e.t, s: e.s, dir: 'out', i });
    if (adj[e.t]) adj[e.t].push({ id: e.f, s: e.s, dir: 'in',  i });
  });

  // Hover bindings
  nodes.forEach(n => {
    const el = nm[n.id].el;
    el.addEventListener('mouseenter', () => {
      if (selectedId !== null) return;
      Object.values(nm).forEach(nn => nn.el.classList.add('dimmed'));
      svgPaths.forEach(p => { if (p) p.style.opacity = '0.04'; });
      el.classList.remove('dimmed'); el.classList.add('hovered');
      (adj[n.id] || []).forEach(({ id, s, dir, i }) => {
        const nb = nm[id]; if (!nb) return;
        nb.el.classList.remove('dimmed'); nb.el.classList.add('lit');
        const { color } = scoreStyle(s);
        const badge = document.createElement('div');
        badge.className = 'score-badge';
        badge.style.background = color;
        badge.innerHTML = `<span class="da">${dir==='out'?'↓供应':'↑采购'}</span>${s}<span style="opacity:.6;font-size:8px">/10</span>`;
        nb.el.appendChild(badge);
        const p = svgPaths[i]; if (!p) return;
        const { color: sc, mk } = scoreStyle(s);
        p.style.opacity = '1'; p.setAttribute('stroke', sc + 'cc');
        p.setAttribute('stroke-width','2.8'); p.setAttribute('marker-end',`url(#${mk})`);
      });
    });
    el.addEventListener('mouseleave', () => {
      if (selectedId !== null) return;
      resetAll();
    });
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (selectedId === n.id) closePanel(); else openPanel(n.id);
    });
  });

  // Apply cached quotes immediately
  Object.values(liveQuotes).forEach(q => applyQuote(q));
}

// ── Panel ─────────────────────────────────────────────────────────────────────
const panel     = document.getElementById('panel');
const panelBody = document.getElementById('panel-body');

function buildPanelLiveHTML(q) {
  if (!q) return '';
  const pct = q.changePct;
  const cls = pct != null ? (pct > 0.01 ? 'pos' : pct < -0.01 ? 'neg' : 'neu') : 'neu';
  const priceStr = q.price != null
    ? '$' + q.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    : '—';
  const pctStr = pct != null ? (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%' : '';
  const chgStr = q.change != null ? (q.change >= 0 ? '+' : '') + q.change.toFixed(2) : '';
  const hiStr  = q.high != null ? '$' + q.high.toFixed(2) : '';
  const loStr  = q.low  != null ? '$' + q.low.toFixed(2)  : '';
  const detail = [
    chgStr ? `涨跌额 ${chgStr}` : '',
    hiStr  ? `最高 ${hiStr}` : '',
    loStr  ? `最低 ${loStr}` : '',
  ].filter(Boolean).join(' &nbsp;·&nbsp; ');
  return `
    <div class="panel-live">
      <span class="panel-live-price">${priceStr}</span>
      <span class="panel-live-chg ${cls}">${pctStr}</span>
    </div>
    ${detail ? `<div class="panel-live-details">${detail}</div>` : ''}
  `;
}

function updatePanelLive(q) {
  const el = document.getElementById('panel-live-block');
  if (!el) return;
  el.innerHTML = buildPanelLiveHTML(q);
}

async function fetchNews(symbol) {
  const key = getFhKey(); if (!key) throw new Error('NO_KEY');
  const to = new Date(), from = new Date();
  from.setDate(from.getDate() - 30);
  const fmt = d => d.toISOString().slice(0,10);
  const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=${fmt(from)}&to=${fmt(to)}&token=${key}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchEarnings(symbol) {
  const key = getFhKey(); if (!key) throw new Error('NO_KEY');
  const r = await fetch(`https://finnhub.io/api/v1/stock/earnings?symbol=${symbol}&limit=4&token=${key}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleDateString('zh-CN', { month:'short', day:'numeric', year:'numeric' });
}

function renderNews(articles) {
  if (!articles?.length) return `<div class="data-empty">最近 30 天暂无新闻数据</div>`;
  return articles.slice(0,6).map(a => `
    <div class="news-item">
      <a class="news-headline" href="${a.url}" target="_blank" rel="noopener">${a.headline}</a>
      <div class="news-meta">
        <span class="news-source">${a.source || '未知'}</span>
        <span>${fmtDate(a.datetime)}</span>
      </div>
    </div>`).join('');
}

function renderEarnings(data) {
  const earns = Array.isArray(data) ? data : (data.earningsCalendar || []);
  if (!earns?.length) return `<div class="data-empty">暂无季度财报数据</div>`;
  return earns.slice(0,4).map(e => {
    const sp = e.surprisePercent;
    const spStr = sp != null ? `${sp >= 0 ? '+' : ''}${sp.toFixed(1)}%` : '—';
    const spCls = sp == null ? 'surprise-neu' : sp > 0 ? 'surprise-pos' : 'surprise-neg';
    const fmtEps = v => v != null ? (v >= 0 ? '+' : '') + v.toFixed(2) : '—';
    const period = e.period ? e.period.slice(0,7) : (e.quarter ? `Q${e.quarter} ${e.year}` : '—');
    return `
      <div class="earnings-card">
        <div class="earnings-header">
          <div class="earnings-period">${period}</div>
          <div class="earnings-surprise ${spCls}">EPS 惊喜 ${spStr}</div>
        </div>
        <div class="eps-grid">
          <div class="eps-cell">
            <div class="eps-label">实际 EPS</div>
            <div class="eps-val eps-actual">${fmtEps(e.actual)}</div>
          </div>
          <div class="eps-cell">
            <div class="eps-label">预期 EPS</div>
            <div class="eps-val eps-est">${fmtEps(e.estimate)}</div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function openPanel(id) {
  selectedId = id; newsOpen = false; earningsOpen = false;
  resetAll();
  if (!nm[id]) return;
  nm[id].el.classList.add('selected');
  const chart = CHARTS[currentChart];
  const node  = nm[id];
  const d     = chart.info[id] || {};
  const lc    = LCOLORS[node.l];
  const ln    = chart.layerNames[node.l];
  const q     = liveQuotes[id] || null;

  const ups   = (adj[id]||[]).filter(e => e.dir === 'in').sort((a,b) => b.s - a.s);
  const downs = (adj[id]||[]).filter(e => e.dir === 'out').sort((a,b) => b.s - a.s);

  function relRows(arr, dirLabel) {
    if (!arr.length) return '';
    return `<div class="panel-section-title">${dirLabel}</div><div class="rel-list">${
      arr.map(e => {
        const nb = nm[e.id]; if (!nb) return '';
        const { color } = scoreStyle(e.s);
        return `<div class="rel-item" data-id="${e.id}">
          <div class="rel-dir" style="color:${color}">${e.dir==='in'?'↑上游':'↓下游'}</div>
          <div class="rel-ticker" style="color:${LCOLORS[nb.l]}">${e.id}</div>
          <div class="rel-co">${nb.co}</div>
          <div class="rel-score-bar-wrap">
            <div class="rel-score-bar" style="width:${Math.round(e.s*10)}px;background:${color}"></div>
            <div class="rel-score-num" style="color:${color}">${e.s}</div>
          </div>
        </div>`;
      }).join('')
    }</div><div style="height:16px"></div>`;
  }

  const hasKey = !!getFhKey();
  const keyTip = hasKey ? '' : ' <span style="font-size:10px;color:#f59e0b;font-weight:400">（需设置 Finnhub Key）</span>';

  panelBody.innerHTML = `
    <div class="panel-layer-badge" style="background:${lc}18; color:${lc}; border:1px solid ${lc}44">
      第 ${node.l} 层 · ${ln}
    </div>
    <div class="panel-ticker" style="color:${lc}">${id}</div>
    <div class="panel-coname">${node.co}</div>
    <div id="panel-live-block">${buildPanelLiveHTML(q)}</div>
    <div class="panel-divider"></div>
    <div class="panel-section-title">业务概要</div>
    <div class="panel-summary">${d.summary || '暂无详情。'}</div>
    <div class="panel-divider"></div>

    <div class="action-btns">
      <button class="action-btn" id="btn-news">📰 最近新闻${keyTip}</button>
      <button class="action-btn" id="btn-earnings">📊 过往财报${keyTip}</button>
    </div>

    <div class="data-section hidden" id="news-section">
      <div class="panel-divider"></div>
      <div class="panel-section-title">最近新闻（30 天）</div>
      <div id="news-content"></div>
    </div>

    <div class="data-section hidden" id="earnings-section">
      <div class="panel-divider"></div>
      <div class="panel-section-title">过往财报（近 4 季）</div>
      <div id="earnings-content"></div>
    </div>

    <div class="panel-divider"></div>
    ${relRows(ups,   '直接上游供应商')}
    ${relRows(downs, '直接下游客户')}
  `;

  panelBody.querySelectorAll('.rel-item[data-id]').forEach(el => {
    el.addEventListener('click', () => openPanel(el.dataset.id));
  });

  function bindDataBtn(btnId, sectionId, contentId, flagName, fetchFn, renderFn, label) {
    const btn = document.getElementById(btnId);
    const sec = document.getElementById(sectionId);
    const con = document.getElementById(contentId);
    btn.addEventListener('click', async () => {
      const open = (flagName === 'news') ? newsOpen : earningsOpen;
      if (open) {
        if (flagName === 'news') newsOpen = false; else earningsOpen = false;
        sec.classList.add('hidden');
        btn.classList.remove('active');
        return;
      }
      if (!getFhKey()) { document.getElementById('settings-btn').click(); return; }
      if (flagName === 'news') newsOpen = true; else earningsOpen = true;
      btn.classList.add('active', 'loading');
      btn.innerHTML = `<span class="spinner"></span> 加载中…`;
      sec.classList.remove('hidden');
      con.innerHTML = `<div class="data-empty"><span class="spinner"></span></div>`;
      try {
        const data = await fetchFn(id);
        con.innerHTML = renderFn(data);
      } catch(err) {
        con.innerHTML = err.message === 'NO_KEY'
          ? `<div class="data-error">请先设置 Finnhub API Key</div>`
          : `<div class="data-error">获取失败：${err.message}</div>`;
      } finally {
        btn.classList.remove('loading');
        btn.innerHTML = label;
      }
    });
  }

  bindDataBtn('btn-news',     'news-section',     'news-content',     'news',     fetchNews,     renderNews,     '📰 最近新闻' + keyTip);
  bindDataBtn('btn-earnings', 'earnings-section', 'earnings-content', 'earnings', fetchEarnings, renderEarnings, '📊 过往财报' + keyTip);

  panel.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
  selectedId = null;
  resetAll();
}

document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('diagram').addEventListener('click', (e) => {
  if (!e.target.closest('.card')) closePanel();
});

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.chart;
    if (target !== currentChart) renderChart(target);
  });
});

// ── WebSocket connection ──────────────────────────────────────────────────────
const WS_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? `ws://${location.host}`
  : 'ws://localhost:8080';
let ws = null;

function setWsBar(connected, html) {
  const bar = document.getElementById('ws-bar');
  bar.className = connected ? 'connected' : 'disconnected';
  document.getElementById('ws-msg').innerHTML = html;
}

function connectWs() {
  try { ws = new WebSocket(WS_URL); } catch(e) { scheduleReconnect(); return; }
  ws.onopen = () => setWsBar(true, '⚡ 实时行情已连接 — TradingView Live');
  ws.onmessage = (evt) => {
    try {
      const d = JSON.parse(evt.data);
      if (d.type === 'quote') {
        liveQuotes[d.ticker] = d;
        applyQuote(d);
        if (selectedId === d.ticker) updatePanelLive(d);
      }
    } catch (_) {}
  };
  ws.onclose = () => {
    setWsBar(false, '实时数据未连接 — 终端运行：<code style="background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:4px;font-size:10px">cd server &amp;&amp; npm install &amp;&amp; npm start</code>');
    scheduleReconnect();
  };
  ws.onerror = () => ws.close();
}
function scheduleReconnect() { setTimeout(connectWs, 4000); }

// ── Init ──────────────────────────────────────────────────────────────────────
refreshSettingsBtn();
const initialChart = localStorage.getItem(LS_CHART) || 'ai';
renderChart(initialChart);
connectWs();
</script>
